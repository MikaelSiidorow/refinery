name: Release Discipline Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled

jobs:
  release-discipline-check:
    name: Enforce Version Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Validate package version and contract policy
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = (pr.labels ?? []).map((label) => label.name);
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              },
              (response) => response.data
            );
            const changedFiles = files.map((file) => file.filename);

            const commentMarker = '<!-- release-discipline-comment -->';
            const migrationPattern = /^drizzle\/[^/]+\.sql$/;
            const schemaLabels = ['schema:expand', 'schema:contract'];
            const appPatterns = [
              /^src\//,
              /^drizzle\//,
              /^drizzle\.config\.ts$/,
              /^drizzle-zero\.config\.ts$/,
              /^package\.json$/,
              /^pnpm-lock\.yaml$/,
              /^\.npmrc$/,
              /^components\.json$/,
              /^Dockerfile\.app$/,
              /^scripts\/run-migrations\.js$/
            ];
            const zeroPatterns = [
              /^Dockerfile\.zero$/,
              /^scripts\/zero-entrypoint\.sh$/,
              /^pnpm-lock\.yaml$/,
              /^\.npmrc$/
            ];
            const isContract = labels.includes('schema:contract');
            const matchedLabels = labels.filter((label) => schemaLabels.includes(label));
            const changedMigrationFiles = changedFiles.filter((filename) => migrationPattern.test(filename));
            const needsMigration = changedMigrationFiles.length > 0;
            const canWriteComment = pr.head.repo.full_name === pr.base.repo.full_name;

            function parseSemver(version) {
              const match = /^v?(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(version);
              if (!match) {
                throw new Error(`Invalid semver version: ${version}`);
              }

              return [Number(match[1]), Number(match[2]), Number(match[3])];
            }

            function compareSemver(left, right) {
              const leftParts = parseSemver(left);
              const rightParts = parseSemver(right);

              for (let index = 0; index < leftParts.length; index += 1) {
                if (leftParts[index] > rightParts[index]) return 1;
                if (leftParts[index] < rightParts[index]) return -1;
              }

              return 0;
            }

            function matchesAny(filename, patterns) {
              return patterns.some((pattern) => pattern.test(filename));
            }

            function extractMinSupportedVersion(source) {
              const match = source.match(/export const minSupportedVersion = ['"]([^'"]+)['"]/);

              if (!match) {
                throw new Error('Could not find minSupportedVersion in src/lib/version-policy.ts');
              }

              return match[1];
            }

            function formatList(items) {
              return items.length > 0 ? items.map((item) => `\`${item}\``).join(', ') : 'none';
            }

            function buildMermaidPlan({ promoteApp, promoteMigrate, promoteZero, appChanged, zeroChanged, migrationPhase }) {
              const promotionTargets = [
                promoteApp ? 'app' : null,
                promoteMigrate ? 'migrate' : null,
                promoteZero ? 'zero' : null,
              ].filter(Boolean);

              const lines = [
                '```mermaid',
                'flowchart LR',
                '  build["Build merged images"]',
                `  promote["Promote ${promotionTargets.length > 0 ? promotionTargets.join(', ') : 'no runtime'} to :production"]`,
                '  build --> promote',
              ];

              let lastNode = 'promote';

              if (migrationPhase === 'before') {
                lines.push('  migrate_before["Run migrate job"]');
                lines.push(`  ${lastNode} --> migrate_before`);
                lastNode = 'migrate_before';
              }

              if (appChanged) {
                lines.push('  app["Restart refinery-app"]');
                lines.push(`  ${lastNode} --> app`);
                lastNode = 'app';
              }

              if (zeroChanged) {
                lines.push('  zero["Restart refinery-zero"]');
                lines.push(`  ${lastNode} --> zero`);
                lastNode = 'zero';
              }

              if (migrationPhase === 'after') {
                lines.push('  migrate_after["Run migrate job"]');
                lines.push(`  ${lastNode} --> migrate_after`);
                lastNode = 'migrate_after';
              }

              if (!appChanged && !zeroChanged && migrationPhase === 'none') {
                lines.push('  noop["No deployment restart"]');
                lines.push(`  ${lastNode} --> noop`);
              }

              lines.push('```');

              return lines.join('\n');
            }

            async function fetchText(repoInfo, path, ref) {
              const response = await github.rest.repos.getContent({
                owner: repoInfo.owner.login,
                repo: repoInfo.name,
                path,
                ref,
              });

              if (Array.isArray(response.data) || response.data.type !== 'file') {
                throw new Error(`Expected ${path} at ${ref} to be a file`);
              }

              return Buffer.from(response.data.content, response.data.encoding).toString('utf8');
            }

            const basePackageJson = JSON.parse(
              await fetchText(pr.base.repo, 'package.json', pr.base.sha)
            );
            const headPackageJson = JSON.parse(
              await fetchText(pr.head.repo, 'package.json', pr.head.sha)
            );
            const headVersionPolicy = await fetchText(
              pr.head.repo,
              'src/lib/version-policy.ts',
              pr.head.sha
            );

            const failures = [];
            const versionChanged = changedFiles.includes('package.json');
            const baseVersion = basePackageJson.version;
            const headVersion = headPackageJson.version;
            const headMinimum = extractMinSupportedVersion(headVersionPolicy);
            const appChanged = changedFiles.some((filename) => matchesAny(filename, appPatterns));
            const zeroChanged = changedFiles.some((filename) => matchesAny(filename, zeroPatterns));
            const deployments = [
              appChanged ? 'refinery-app' : null,
              zeroChanged ? 'refinery-zero' : null,
            ].filter(Boolean);
            const migrationPhase =
              matchedLabels[0] === 'schema:contract'
                ? 'after'
                : needsMigration
                  ? 'before'
                  : 'none';
            const promoteApp = appChanged;
            const promoteMigrate = appChanged || needsMigration;
            const promoteZero = zeroChanged;

            if (!versionChanged) {
              failures.push('Every PR must update package.json and bump the app version.');
            } else if (compareSemver(headVersion, baseVersion) <= 0) {
              failures.push(
                `package.json version must increase. Base is ${baseVersion}, PR is ${headVersion}.`
              );
            }

            if (compareSemver(headMinimum, headVersion) > 0) {
              failures.push(
                `minSupportedVersion (${headMinimum}) cannot be greater than package.json version (${headVersion}).`
              );
            }

            let baseMinimum = null;
            if (isContract) {
              const baseVersionPolicy = await fetchText(
                pr.base.repo,
                'src/lib/version-policy.ts',
                pr.base.sha
              );

              baseMinimum = extractMinSupportedVersion(baseVersionPolicy);

              if (!changedFiles.includes('src/lib/version-policy.ts')) {
                failures.push(
                  'schema:contract PRs must update src/lib/version-policy.ts and raise minSupportedVersion.'
                );
              } else if (compareSemver(headMinimum, baseMinimum) <= 0) {
                failures.push(
                  `schema:contract PRs must raise minSupportedVersion. Base is ${baseMinimum}, PR is ${headMinimum}.`
                );
              }
            }

            const labelStatus = needsMigration
              ? matchedLabels.length === 1
                ? matchedLabels[0]
                : 'invalid'
              : matchedLabels.length > 0
                ? matchedLabels.join(', ')
                : 'none';

            const commentBody = [
              commentMarker,
              '## Release Discipline',
              failures.length === 0
                ? '✅ Version policy checks passed.'
                : '❌ Action required before merge.',
              '',
              '**Versioning**',
              `- Package version: \`${baseVersion} -> ${headVersion}\``,
              `- minSupportedVersion: \`${baseMinimum ?? headMinimum} -> ${headMinimum}\``,
              `- Release tag on main: \`${headVersion}\``,
              '',
              '**Schema**',
              `- Migration files: ${formatList(changedMigrationFiles)}`,
              `- Schema label: \`${labelStatus}\``,
              `- Migration phase: \`${migrationPhase}\``,
              '',
              '**Deploy Plan**',
              `- Promote tags: ${formatList([
                promoteApp ? 'app' : null,
                promoteMigrate ? 'migrate' : null,
                promoteZero ? 'zero' : null,
              ].filter(Boolean))}`,
              `- Restart deployments: ${formatList(deployments)}`,
              '',
              buildMermaidPlan({
                promoteApp,
                promoteMigrate,
                promoteZero,
                appChanged,
                zeroChanged,
                migrationPhase,
              }),
              '',
              '**Blocking issues**',
              ...(failures.length > 0 ? failures.map((failure) => `- ${failure}`) : ['- none']),
            ].join('\n');

            let commentStatus = 'skipped on fork PR';

            if (canWriteComment) {
              try {
                const existingComments = await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner,
                    repo,
                    issue_number: pr.number,
                    per_page: 100,
                  },
                  (response) => response.data
                );

                const existingComment = existingComments.find(
                  (comment) => comment.body?.includes(commentMarker)
                );

                if (existingComment) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existingComment.id,
                    body: commentBody,
                  });
                  commentStatus = 'updated sticky PR comment';
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: commentBody,
                  });
                  commentStatus = 'created sticky PR comment';
                }
              } catch (error) {
                commentStatus = 'comment unavailable; using job summary only';
                core.warning(`Could not write PR comment: ${error.message}`);
              }
            }

            await core.summary
              .addHeading('Release Discipline Check')
              .addRaw(`Package version: ${baseVersion} -> ${headVersion}\n\n`)
              .addRaw(`minSupportedVersion: ${baseMinimum ?? 'n/a'} -> ${headMinimum}\n\n`)
              .addRaw(`schema:contract label: ${isContract ? 'present' : 'absent'}\n\n`)
              .addRaw(`Migration files: ${changedMigrationFiles.length > 0 ? changedMigrationFiles.join(', ') : 'none'}\n\n`)
              .addRaw(`Deployments: ${deployments.length > 0 ? deployments.join(', ') : 'none'}\n\n`)
              .addRaw(`Migration phase: ${migrationPhase}\n\n`)
              .addRaw(`PR comment: ${commentStatus}\n\n`)
              .addRaw(
                failures.length === 0
                  ? 'All release-discipline checks passed.\n'
                  : failures.map((failure) => `- ${failure}`).join('\n')
              )
              .write();

            const logSummary = [
              `package=${baseVersion}->${headVersion}`,
              `minSupported=${baseMinimum ?? 'n/a'}->${headMinimum}`,
              `migrationPhase=${migrationPhase}`,
              `deployments=${deployments.length > 0 ? deployments.join(',') : 'none'}`,
              `prComment=${commentStatus}`,
            ].join(' | ');

            core.notice(`Release Discipline summary: ${logSummary}`);

            if (commentStatus !== 'created sticky PR comment' && commentStatus !== 'updated sticky PR comment') {
              core.notice(
                `Release Discipline comment fallback active: ${commentStatus}. See the job summary for the full report.`
              );
            }

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }
